<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BAMBIKA Crash Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>Dashboard</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="games.html">Games</a></li>
                    <li><a href="wallet.html">Wallet</a></li>
                    <li><a href="profile.js">Profile</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="stats">
                <div class="stat-card">
                    <h3>Balance</h3>
                    <p id="balance">$0.00</p>
                </div>
                <div class="stat-card">
                    <h3>Total Wins</h3>
                    <p id="wins">0</p>
                </div>
                <div class="stat-card">
                    <h3>Games Played</h3>
                    <p id="gamesPlayed">0</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
